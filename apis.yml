description: >-
  Backstage is an open-source developer portal platform created by Spotify. It
  provides a centralized software catalog, software templates (scaffolder),
  TechDocs, and a plugin ecosystem for building customizable developer portals.
  Backstage helps organizations manage their software ecosystem by cataloging
  services, APIs, resources, and infrastructure, and provides tooling for
  creating new projects from templates.
