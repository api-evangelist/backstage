naftiko: "1.0.0-alpha1"

info:
  label: "Backstage Catalog API"
  description: "Backstage Software Catalog REST API for managing and querying catalog entities, locations, and metadata."
  tags:
    - Backstage
    - Developer Portal
    - Software Catalog
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      BACKSTAGE_TOKEN: BACKSTAGE_TOKEN

capability:
  consumes:
    - type: http
      namespace: backstage-catalog
      baseUri: https://backstage.example.com/api/catalog
      description: "Backstage Software Catalog API"
      authentication:
        type: bearer
        token: "{{BACKSTAGE_TOKEN}}"
      resources:
        - name: entities
          path: /entities
          description: Catalog entity management
          operations:
            - name: list-entities
              method: GET
              description: List all entities in the catalog
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-entity-by-ref
              method: GET
              description: Get a single entity by its entity ref
              inputParameters:
                - name: kind
                  in: path
                  type: string
                  required: true
                - name: namespace
                  in: path
                  type: string
                  required: true
                - name: name
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-entity
              method: DELETE
              description: Delete an entity from the catalog
              inputParameters:
                - name: uid
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: locations
          path: /locations
          description: Catalog location management
          operations:
            - name: list-locations
              method: GET
              description: List all registered catalog locations
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-location
              method: POST
              description: Register a new catalog location
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  type: "{{tools.location_type}}"
                  target: "{{tools.location_target}}"

  exposes:
    - type: rest
      port: 8110
      namespace: backstage-catalog-rest
      resources:
        - path: /v1/entities
          name: entities
          description: Catalog entities
          operations:
            - method: GET
              name: list-entities
              description: List catalog entities
              call: "backstage-catalog.list-entities"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9110
      namespace: backstage-catalog-mcp
      transport: http
      tools:
        - name: list-entities
          description: List all entities in the Backstage software catalog
          hints:
            readOnly: true
            openWorld: false
          call: "backstage-catalog.list-entities"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-entity-by-ref
          description: Get a specific entity by its kind/namespace/name reference
          hints:
            readOnly: true
            openWorld: false
          call: "backstage-catalog.get-entity-by-ref"
          with:
            kind: "tools.kind"
            namespace: "tools.namespace"
            name: "tools.name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-location
          description: Register a new catalog location (GitHub repo, URL) with the catalog
          hints:
            readOnly: false
            openWorld: false
          call: "backstage-catalog.create-location"
          with:
            location_type: "tools.location_type"
            location_target: "tools.location_target"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-entity
          description: Delete an entity from the catalog
          hints:
            readOnly: false
            destructive: true
          call: "backstage-catalog.delete-entity"
          with:
            uid: "tools.uid"
          outputParameters:
            - type: object
              mapping: "$."
